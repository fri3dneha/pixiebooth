<!DOCTYPE html>
<html>
<head>
    <title>PixiBooth 📸</title>
    <!-- @ts-nocheck -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>

    <style>
        .side-logo {
            position: absolute;
            top: 20px;
            left: 30px;

            font-size: 24px;
            font-weight: bold;

            color: #333; 

        }
        button {
            background: #333; /* butter yellow */
            color: whitesmoke;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: #333;
            transform: scale(1.05);
        }
        body {
            font-family: Arial;
            text-align: center;
            background: #fff3b0; 
            color: #333;
            margin: 0;
        }

        canvas {
            display: block;
            margin: 20px auto;
            border: 3px solid black;
        }

        .editor-box {
            background: #333;
            padding: 20px;
            border-radius: 10px;
            width: fit-content;
            margin: 20px auto;
        }

        .sticker {
            width: 60px;
            cursor: pointer;
            margin: 5px;
        }
    </style>
</head>

<body>
<div class="side-logo">pixibooth</div>

<form action="/upload" method="POST" enctype="multipart/form-data">

    <input type="file" name="photos" multiple required><br><br>

    <select name="layout">
        <option value="strip3">3 Photo Strip</option>
        <option value="square4">4 Photo Square</option>
        <option value="vertical4">4 Photo Vertical</option>
        <option value="grid6">6 Photo Grid</option>
        <option value="grid8">8 Photo Grid</option>
    </select><br><br>

    <input type="color" name="border_color" value="#ffffff"><br><br>

    <button type="submit">Generate</button>
</form>

<hr>

{% if image_url %}

<h2>Edit Your Photobooth</h2>

<div class="editor-box">
    <canvas id="editorCanvas"></canvas>
</div>

<h3>Stickers</h3>

<img src="/static/stickers/cold_ok.png" class="sticker" onclick="addSticker(this.src)">
<img src="/static/stickers/derp.png" class="sticker" onclick="addSticker(this.src)">
<img src="/static/stickers/pharmsey.png" class="sticker" onclick="addSticker(this.src)">
<img src="/static/stickers/pikachu.png" class="sticker" onclick="addSticker(this.src)">
<img src="/static/stickers/patrickdrooling.png" class="sticker" onclick="addSticker(this.src)">
<img src="/static/stickers/mincraft_with_pig.png" class="sticker" onclick="addSticker(this.src)">
<img src="/static/stickers/shitting.png" class="sticker" onclick="addSticker(this.src)">
<img src="/static/stickers/shypatrick.png" class="sticker" onclick="addSticker(this.src)">

<br><br>

<input type="text" id="textInput">
<button onclick="addText()">Add Text</button>

<br><br>

<button onclick="downloadImage()">Download</button>

{% endif %}

<script>
let canvas = new fabric.Canvas('editorCanvas');

let imgUrl = "{{ image_url if image_url else '' }}";

if (imgUrl !== "") {

    fabric.Image.fromURL(imgUrl, function(img) {

        let maxWidth = 400;
        let scale = maxWidth / img.width;

        img.scale(scale);

        canvas.setWidth(img.width * scale);
        canvas.setHeight(img.height * scale);

        img.selectable = false;

        canvas.setBackgroundImage(img, function() {
            canvas.renderAll();
        });

    }, { crossOrigin: 'anonymous' });
}

function addSticker(src) {
    fabric.Image.fromURL(src, function(img) {
        img.scaleToWidth(80);
        img.left = 50;
        img.top = 50;
        canvas.add(img);
    });
}

function addText() {
    let text = document.getElementById("textInput").value;

    let textbox = new fabric.Textbox(text, {
        left: 50,
        top: 50,
        fontSize: 30,
        fill: "black"
    });

    canvas.add(textbox);
}

function downloadImage() {
    let link = document.createElement('a');
    link.download = 'photobooth.png';
    link.href = canvas.toDataURL();
    link.click();
}

document.addEventListener('keydown', function(e) {
    if (e.key === "Delete") {
        let obj = canvas.getActiveObject();
        if (obj) canvas.remove(obj);
    }
});
</script>

</body>
</html>
